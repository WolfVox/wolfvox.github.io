<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfVox™ | Cloud Forms</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* BASE THEME (RENDER.COM INSPIRED) */
        :root {
            --bg: #030303;
            --card-bg: #0a0a0c;
            --border: #1a1a1e;
            --accent: #7a6cff;
            --text: #ffffff;
            --dim: #88888b;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }
        
        /* HEADER SECTION */
        header { 
            height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; border-bottom: 1px solid var(--border);
            background: radial-gradient(circle at center, #111 0%, #030303 100%);
        }

        h1 { font-size: 64px; margin: 0; letter-spacing: -2px; }
        p.hero-text { color: var(--dim); font-size: 18px; max-width: 600px; margin: 20px 0; }

        /* THE RENDER BUTTON */
        .cta-btn {
            position: relative; padding: 14px 32px; font-size: 16px;
            background: linear-gradient(to right, white 50%, transparent 50%);
            background-size: 200% 100%; background-position: right bottom;
            border: 1px solid var(--accent); color: var(--accent);
            cursor: pointer; font-weight: bold; transition: all 0.4s ease-in-out;
            text-decoration: none; border-radius: 4px;
        }
        .cta-btn:hover { background-position: left bottom; color: black; border-color: white; }

        /* INFINITE GRID */
        #formsGrid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px; padding: 50px; max-width: 1400px; margin: 0 auto;
        }

        .form-card { 
            background: var(--card-bg); border: 1px solid var(--border); 
            padding: 25px; border-radius: 12px; transition: transform 0.3s;
        }
        .form-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .form-card h3 { margin: 0 0 10px 0; font-size: 20px; }
        .form-card p { color: var(--dim); font-size: 14px; line-height: 1.5; }

        #loading { text-align: center; padding: 40px; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>Wolf<span style="color:var(--accent)">Vox</span></h1>
    <p class="hero-text">The next generation of cloud-based developer forms. Built for scale, styled for clarity.</p>
    <a href="index.html" class="cta-btn">GET STARTED</a>
</header>

<div id="formsGrid">
    </div>

<div id="loading"><i class="fas fa-spinner fa-spin"></i> Loading more forms...</div>

<script>
    const API = "https://backhand-forms.onrender.com/api/forms";
    let allData = [];
    let displayedCount = 0;
    const itemsPerPage = 6;

    async function fetchAllForms() {
        const res = await fetch(API);
        allData = await res.json();
        loadMore(); // Initial load
    }

    function loadMore() {
        const grid = document.getElementById('formsGrid');
        const nextBatch = allData.slice(displayedCount, displayedCount + itemsPerPage);
        
        nextBatch.forEach(form => {
            const card = document.createElement('div');
            card.className = 'form-card';
            card.innerHTML = `
                <h3>${form.title}</h3>
                <p>${form.content.substring(0, 100)}...</p>
                <div style="margin-top:20px; color:var(--accent); font-size:12px; font-weight:bold;">
                    ${form.date || 'RECENT'} • VIEW DETAILS
                </div>
            `;
            grid.appendChild(card);
        });

        displayedCount += itemsPerPage;
        
        // Hide loader if no more data
        if (displayedCount >= allData.length) {
            document.getElementById('loading').style.display = 'none';
        }
    }

    // INFINITE SCROLL LOGIC
    window.onscroll = function() {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 100) {
            if (displayedCount < allData.length) {
                loadMore();
            }
        }
    };

    window.onload = fetchAllForms;
</script>

</body>
</html>
